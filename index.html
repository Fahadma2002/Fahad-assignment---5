<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment 5</title>

    <!-- tailwind & daisy -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- icons -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        *{
            font-family: "Geist", sans-serif;
        }
    </style>

</head>
<body>
    <header class="min-h-screen max-w-md bg-base-100 mx-auto shadow-2xl my-20 ">
        <div class="justify-items-center mx-auto pt-20 ">
            <img src="./assets/github-logo.png" alt="">
            <h2 class="font-semibold text-xl pt-6">GitHub Issues Tracker</h2>
            <p class="text-sm text-[#64748B]">Sign in to manage your issues</p>
        </div>

        <div class="form pt-6">
            <div class="card bg-base-100 w-full max-w-sm shrink-0 mx-auto">
      <div class="card-body">
        <fieldset class="fieldset">
          <label class="label font-medium text-black">Username</label>
          <input id="input-username" type="text" class="input" maxlength="5" value="admin" placeholder="Enter Username" />

          <br>
          <label class="label font-medium text-black">Password</label>
          <input id="input-password" type="password" class="input" maxlength="8" placeholder="Enter Password" />
          
          <button id="login-btn" class="btn btn-primary mt-4">Sign In</button>
        </fieldset>
      </div>
    </div>
  </div>
    </div>
    </header>


    <script src="script/script.js"></script>
</body>
</html>
