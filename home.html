<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>

    <!-- tailwind & daisy -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- icons -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        *{
            font-family: "Geist", sans-serif;
        }
    </style>

</head>
<body>
    <header class="w-11/12 mx-auto">
    <div class="navbar flex justify-between bg-base-100 shadow-sm">
        <div class="flex items-center gap-2">
            <img class="h-9 w-9" src="./assets/github-logo.png" alt="">
            <h2 class="font-semibold text-xl">GitHub Issues Tracker</h2>
        </div>

        <div class="space-x-4">
            <input type="text" placeholder="Search issues..." class="input input-bordered w-24 md:w-auto" />
            <button class="btn btn-primary">New issue</button>
        </div>
    </div>
    </header>

    <section class="w-11/12 mx-auto mt-15">
        <div class="space-x-2">
            <button onclick="toggleStyle('all-filter-btn')" id="all-filter-btn" class="btn">All</button>
            <button onclick="toggleStyle('open-filter-btn')" id="open-filter-btn" class="btn">Open</button>
            <button onclick="toggleStyle('closed-filter-btn')" id="closed-filter-btn" class="btn">Closed</button>
        </div>
        <div class="flex justify-between mt-6">
            <div class="flex gap-2">
                <div class="content-center bg-[#ECE4FF] "><img src="./assets/Aperture.png" alt=""></div>
                <div>
                    <h3 class="font-semibold">50 Issues</h3>
                    <p class="text-[#64748B]">Track and manage your project issues</p>
                </div>
            </div>

            <div class="flex gap-8">
                <p>Open</p>
                <p>Closed</p>
            </div>
        </div>
    </section>


    <section>
        <div></div>
    </section>

    <script src="script/home.js"></script>
</body>
</html>
